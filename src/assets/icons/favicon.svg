<svg width="300" height="100" viewBox="0 0 300 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes foundation {
      0% { transform: scaleX(0); transform-origin: left; }
      100% { transform: scaleX(1); }
    }
    @keyframes wallUp {
      0% { transform: scaleY(0); transform-origin: bottom; }
      100% { transform: scaleY(1); }
    }
    @keyframes drawPath {
      0% { stroke-dasharray: 0, 100; }
      100% { stroke-dasharray: 100, 0; }
    }
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(-10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      0% { opacity: 0; transform: translateX(-20px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes typewriter {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    
    .foundation { animation: foundation 0.6s ease-out forwards; transform-origin: left; }
    .walls { animation: wallUp 0.5s ease-out 0.6s forwards; transform-origin: bottom; transform: scaleY(0); }
    .roof { stroke-dasharray: 0, 100; animation: drawPath 0.8s ease-out 1.2s forwards; }
    .gable { stroke-dasharray: 0, 100; animation: drawPath 0.8s ease-out 1.8s forwards; }
    .chimney { animation: fadeInUp 0.5s ease-out 2.4s forwards; opacity: 0; }
    .window { animation: fadeInUp 0.4s ease-out 2.9s forwards; opacity: 0; }
    .text-main { animation: slideIn 0.5s ease-out 3.3s forwards; opacity: 0; }
    .text-sub { animation: slideIn 0.5s ease-out 3.8s forwards; opacity: 0; }
    .tagline span { animation: typewriter 0.03s forwards; opacity: 0; }
  </style>
  
  <!-- House Icon Section -->
  <g transform="translate(0, 0)">
    <!-- Foundation -->
    <rect x="10" y="85" width="100" height="3" fill="#c9a959" class="foundation"/>
    
    <!-- Side Walls -->
    <g class="walls">
      <rect x="15" y="55" width="3" height="30" fill="#c9a959"/>
      <rect x="102" y="55" width="3" height="30" fill="#c9a959"/>
    </g>
    
    <!-- Back Roof Slope -->
    <path d="M77 40 L95 15 L115 45" stroke="#c9a959" stroke-width="4" fill="none" class="roof"/>
    
    <!-- Front Gable -->
    <path d="M5 55 L45 15 L85 55" stroke="#c9a959" stroke-width="5" fill="none" class="gable"/>
    
    <!-- Chimney -->
    <rect x="22" y="18" width="6" height="16" fill="#c9a959" class="chimney"/>
    
    <!-- Arched Window -->
    <path d="M35 45 A10 10 0 0 1 55 45 L55 65 L35 65 Z" stroke="#c9a959" stroke-width="2" fill="none" class="window"/>
  </g>
  
  <!-- Text Section -->
  <g transform="translate(125, 25)">
    <!-- INTERLOCKING -->
    <text x="0" y="20" font-family="Playfair Display, Georgia, serif" font-size="24" font-weight="900" fill="#c9a959" letter-spacing="-0.5" class="text-main">
      INTERLOCKING
    </text>
    
    <!-- BLOCK BUILDERS -->
    <text x="0" y="48" font-family="Playfair Display, Georgia, serif" font-size="16" font-weight="700" fill="#94a3b8" letter-spacing="1" class="text-sub">
      BLOCK BUILDERS
    </text>
    
    <!-- Tagline with typewriter effect -->
    <text x="0" y="80" font-family="Playfair Display, Georgia, serif" font-size="10" font-style="italic" fill="#c9a959" class="tagline">
      <tspan class="tagline-span">Building futures, One block at a time</tspan>
    </text>
  </g>
  
  <script type="text/javascript">
    <![CDATA[
      // Add typewriter effect to tagline
      var tagline = document.querySelector('.tagline tspan');
      if (tagline) {
        var text = tagline.textContent;
        tagline.textContent = '';
        for (var i = 0; i < text.length; i++) {
          var span = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
          span.textContent = text[i];
          span.style.animation = 'typewriter 0.03s forwards';
          span.style.animationDelay = (3.9 + i * 0.03) + 's';
          span.style.opacity = '0';
          tagline.appendChild(span);
        }
      }
    ]]>
  </script>
</svg>